version: '3.8'

services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - msf_network

  backend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - database
      - metasploit
    networks:
      - msf_network

  database:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - msf_network

  metasploit:
    image: metasploitframework/metasploit-framework:latest
    container_name: msf_engine
    stdin_open: true
    tty: true
    networks:
      - msf_network

networks:
  msf_network:
    driver: bridge

volumes:
  db_data:
